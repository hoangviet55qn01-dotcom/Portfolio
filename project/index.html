<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Portfolio</title>
  <meta name="description" content="Project case study">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="project-detail">

  <main class="project-detail-page">

    <!-- BACK -->
    <div class="project-detail-back">
      <a href="/index.html" class="back-btn" aria-label="Back to home">←</a>
    </div>

    <!-- HERO: 2-COLUMN -->
    <div class="project-detail-hero">

      <!-- LEFT: INFO -->
      <div class="project-detail-info">
        <h1 id="project-name">Loading...</h1>
        <p id="project-description" class="project-detail-description"></p>

        <div class="project-live-btn">
          <a id="project-live-btn" href="#" target="_blank" rel="noopener" class="btn btn-outline">
            View Live Site
          </a>
        </div>

        <table id="project-meta" class="project-meta-table">
          <!-- Rendered by JS -->
        </table>
      </div>

      <!-- RIGHT: HEADER IMAGE -->
      <div class="project-detail-header-image">
        <img id="project-header-img" src="" alt="" style="min-height:320px">
      </div>

    </div>

    <!-- RICH CONTENT -->
    <div id="project-rich-content" class="project-rich-content">
      <!-- Rendered by JS -->
    </div>

    <!-- MORE WORK -->
    <section class="more-work-section">
      <div class="more-work-header">
        <h2>More Work</h2>
        <a href="/index.html" class="view-all-link">View All</a>
      </div>
      <div id="more-work-grid" class="more-work-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

  </main>

  <script src="/js/main.js"></script>
</body>
</html>
