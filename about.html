<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Hoàng Việt</title>
  <meta name="description" content="About Hoàng Việt — UX/UI Designer with 5+ years of experience.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="about">

  <main class="about-page">

    <!-- BACK BUTTON -->
    <div class="about-back">
      <a href="/index.html" class="back-btn" aria-label="Back to home">←</a>
    </div>

    <!-- HEADER -->
    <div class="about-header">
      <h1 id="about-title" class="about-title">
        Crafting the Future,<br>One Pixel at a Time
      </h1>
      <p id="about-subtitle" class="about-subtitle">
        Passionate about creating impactful, user-centered web app experiences across industries.
      </p>
      <div id="about-social"></div>
    </div>

    <!-- PROFILE IMAGE -->
    <div class="about-profile-image">
      <img id="about-profile-img" src="" alt="Profile" onerror="this.style.display='none'">
    </div>

    <!-- BIO -->
    <div class="about-bio">
      <p id="about-bio-1"></p>
      <p id="about-bio-2"></p>
    </div>

    <!-- EXPERIENCE -->
    <section class="experience-section">
      <h2 class="section-label">Experience</h2>
      <div id="experience-list" class="experience-list">
        <!-- Rendered by JS -->
        <div class="experience-item">
          <div class="skeleton" style="width:160px;height:20px"></div>
          <div class="skeleton" style="width:100px;height:16px"></div>
        </div>
        <div class="experience-item">
          <div class="skeleton" style="width:140px;height:20px"></div>
          <div class="skeleton" style="width:100px;height:16px"></div>
        </div>
        <div class="experience-item">
          <div class="skeleton" style="width:100px;height:20px"></div>
          <div class="skeleton" style="width:100px;height:16px"></div>
        </div>
        <div class="experience-item">
          <div class="skeleton" style="width:120px;height:20px"></div>
          <div class="skeleton" style="width:100px;height:16px"></div>
        </div>
      </div>
    </section>

    <!-- FOOTER CTA -->
    <div class="footer-cta">
      <div class="footer-cta-text">
        <h3>Interested in working together?</h3>
        <p>Shoot me an email if you'd like to chat.</p>
      </div>
      <a id="about-email" href="mailto:" class="btn btn-primary">Email</a>
    </div>

  </main>

  <script src="/js/main.js"></script>
</body>
</html>
